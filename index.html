<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ياسر أبو الشيخ - متجر التطبيقات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0a0a; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1a1a1a, #2d2d2d); padding: 30px 20px; border-radius: 15px; margin-bottom: 30px; text-align: center; border: 1px solid #333; }
        .header h1 { color: #00ff88; text-shadow: 0 0 15px #00ff88; font-size: 32px; margin-bottom: 10px; }
        .header p { color: #ccc; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .app-card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; transition: 0.3s; }
        .app-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0, 255, 136, 0.2); border-color: #00ff88; }
        .app-card img { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; margin-bottom: 15px; border: 1px solid #333; }
        .app-card h3 { color: #00ff88; margin-bottom: 10px; font-size: 20px; }
        .app-card p { color: #ccc; margin-bottom: 15px; font-size: 14px; min-height: 40px; }
        .download-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #00ff88, #00cc6a); border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; text-decoration: none; display: block; text-align: center; }
        .download-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4); }
        .downloads-count { color: #00ff88; font-size: 12px; margin-top: 8px; text-align: center; }
        .loading { text-align: center; color: #00ff88; font-size: 18px; padding: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>متجر ياسر أبو الشيخ</h1>
            <p>أحدث التطبيقات المعدلة والآمنة</p>
        </div>

        <div id="appsContainer" class="apps-grid">
            <div class="loading">جاري تحميل التطبيقات...</div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // نفس إعدادات Firebase تبع الادمن
        const firebaseConfig = {
            apiKey: "AIzaSyBpHQWj6zPwcW_0NILhZXShS3BNlI39yzM",
            authDomain: "maoqea-9f7bd.firebaseapp.com",
            projectId: "maoqea-9f7bd",
            storageBucket: "maoqea-9f7bd.firebasestorage.app",
            messagingSenderId: "361292746574",
            appId: "1:361292746574:web:dce01eabeec060ca00181f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // تحميل التطبيقات من Firebase
        function loadApps() {
            const container = document.getElementById('appsContainer');
            
            db.collection('apps').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                container.innerHTML = '';
                
                if (snapshot.empty) {
                    container.innerHTML = '<div class="loading">لا توجد تطبيقات حالياً</div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const app = doc.data();
                    container.innerHTML += `
                        <div class="app-card">
                            <img src="${app.imageUrl}" onerror="this.src='https://via.placeholder.com/80/1a1a1a/00ff88?text=App'" alt="${app.name}">
                            <h3>${app.name}</h3>
                            <p>${app.description}</p>
                            <a href="${app.downloadLink}" class="download-btn" onclick="incrementDownload('${doc.id}')" target="_blank">تحميل الآن</a>
                            <div class="downloads-count">التحميلات: ${app.downloads || 0}</div>
                        </div>
                    `;
                });
            });
        }

        // زيادة عداد التحميلات
        function incrementDownload(appId) {
            const appRef = db.collection('apps').doc(appId);
            appRef.update({
                downloads: firebase.firestore.FieldValue.increment(1)
            });
        }

        // شغل التحميل اول ما تفتح الصفحة
        loadApps();
    </script>
</body>
</html>
