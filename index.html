<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ياسر أبو الشيخ - متجر التطبيقات</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;box-sizing:border-box;font-family:Tahoma}
        body{background:#000;color:#fff}
        .header{background:linear-gradient(135deg, #1877F2 0%, #000 50%, #E50914 100%);padding:25px;text-align:center;box-shadow:0 4px 20px rgba(229,9,20,0.4)}
        .header h1{font-size:32px;text-shadow:3px 3px 6px #000;margin-bottom:5px}
        .header p{color:#ddd;font-size:16px}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px;padding:20px;max-width:1400px;margin:auto}
        .card{background:#0D0D0D;border:2px solid #1877F2;border-radius:18px;overflow:hidden;text-align:center;transition:0.4s;cursor:pointer}
        .card:hover{transform:translateY(-10px) scale(1.03);border-color:#E50914;box-shadow:0 8px 25px rgba(229,9,20,0.7)}
        .card img{width:100%;height:180px;object-fit:cover}
        .card-content{padding:15px}
        .card h3{font-size:16px;color:#1877F2;margin-bottom:10px;height:42px;line-height:1.3}
        .card p{font-size:13px;color:#999;height:38px;overflow:hidden;margin-bottom:12px;line-height:1.4}
        .card .category{font-size:12px;color:#E50914;margin-bottom:10px;display:block}
        .card a{display:block;background:linear-gradient(45deg, #E50914, #1877F2);color:white;padding:13px;text-decoration:none;font-weight:bold;border-radius:10px;transition:0.3s}
        .card a:hover{opacity:0.8}
        .footer{text-align:center;padding:25px;color:#666;border-top:2px solid #111;margin-top:40px;font-size:14px}
        .loading{text-align:center;padding:60px;color:#1877F2;font-size:20px}
        .tabs{display:flex;gap:12px;justify-content:center;margin:20px 0}
        .tab{background:#0D0D0D;padding:10px 25px;border-radius:10px;cursor:pointer;border:2px solid #1877F2}
        .tab.active{background:linear-gradient(45deg, #E50914, #1877F2);border-color:#E50914}
    </style>
</head>
<body>
    <div class="header">
        <h1>ياسر أبو الشيخ</h1>
        <p>متجر التطبيقات والمواقع الرسمي - تحديث لحظي ⚡</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="filterApps('all')">الكل</div>
        <div class="tab" onclick="filterApps('apps')">تطبيقات</div>
        <div class="tab" onclick="filterApps('games')">ألعاب</div>
    </div>

    <div class="grid" id="appsGrid">
        <div class="loading">جاري التحميل...</div>
    </div>

    <div class="footer">
        جميع الحقوق محفوظة © ياسر أبو الشيخ 2026
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBpHQWj6zPwcW_0NILhZXShS3BNLI39yzM",
      authDomain: "maoqea-9f7bd.firebaseapp.com",
      projectId: "maoqea-9f7bd",
      storageBucket: "maoqea-9f7bd.firebasestorage.app",
      messagingSenderId: "361292746574",
      appId: "1:361292746574:web:dce01eabeec060ca00181f"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let allApps = [];

    // التحديث اللحظي بدون F5
    function loadApps() {
        const grid = document.getElementById('appsGrid');
        db.collection('applications').orderBy('createdAt', 'desc')
          .onSnapshot(snapshot => {
              allApps = [];
              snapshot.forEach(doc => {
                  allApps.push({id: doc.id, ...doc.data()});
              });
              
              if(allApps.length === 0) {
                  grid.innerHTML = '<div class="loading">لا يوجد تطبيقات حالياً</div>';
                  return;
              }
              
              displayApps(allApps);
          }, error => {
              grid.innerHTML = '<div class="loading">صار خطأ بالتحميل. تأكد من قواعد Firestore</div>';
              console.log(error);
          });
    }

    function displayApps(apps) {
        const grid = document.getElementById('appsGrid');
        grid.innerHTML = '';
        apps.forEach(app => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${app.imageUrl || 'https://via.placeholder.com/180'}" alt="${app.name}">
                    <div class="card-content">
                        <span class="category">${app.category === 'games' ? 'ألعاب' : 'تطبيقات'}</span>
                        <h3>${app.name}</h3>
                        <p>${app.description}</p>
                        <a href="${app.downloadLink}" target="_blank">تحميل الآن</a>
                    </div>
                </div>
            `;
        });
    }

    function filterApps(category) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
        
        if (category === 'all') {
            displayApps(allApps);
        } else {
            displayApps(allApps.filter(app => app.category === category));
        }
    }

    loadApps();
</script>
</body>
</html>
