<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم متجر ياسر</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0a0a; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1a1a1a, #2d2d2d); padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; border: 1px solid #333; }
        .header h1 { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .login-box { background: #1a1a1a; padding: 30px; border-radius: 15px; max-width: 400px; margin: 50px auto; border: 1px solid #333; }
        .login-box h2 { color: #00ff88; margin-bottom: 20px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px; }
        input:focus, textarea:focus { outline: none; border-color: #00ff88; box-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #00ff88, #00cc6a); border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4); }
        .dashboard { display: none; }
        .app-form { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .app-list { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .app-item { background: #0a0a0a; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .app-item img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .app-info { flex: 1; margin: 0 15px; }
        .app-info h3 { color: #00ff88; margin-bottom: 5px; }
        .app-info p { color: #ccc; font-size: 14px; }
        .delete-btn { background: #ff0044; color: #fff; padding: 8px 15px; border-radius: 5px; width: auto; }
        .delete-btn:hover { background: #cc0036; }
        .logout-btn { background: #ff0044; width: auto; padding: 8px 20px; float: left; }
        .error { color: #ff0044; margin-top: 10px; text-align: center; }
        .success { color: #00ff88; margin-top: 10px; text-align: center; }
        label { color: #00ff88; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>لوحة تحكم متجر ياسر</h1>
            <button class="logout-btn" onclick="logout()" style="display:none" id="logoutBtn">تسجيل خروج</button>
        </div>

        <!-- تسجيل الدخول -->
        <div class="login-box" id="loginBox">
            <h2>تسجيل الدخول</h2>
            <input type="email" id="email" placeholder="الإيميل" value="yaser@gmail.com">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <div id="loginMsg"></div>
        </div>

        <!-- لوحة التحكم -->
        <div class="dashboard" id="dashboard">
            <div class="app-form">
                <h2 style="color:#00ff88;margin-bottom:15px">إضافة تطبيق جديد</h2>
                <label>اسم التطبيق</label>
                <input type="text" id="appName" placeholder="واتساب الذهبي">
                
                <label>الوصف</label>
                <textarea id="appDesc" placeholder="أحدث نسخة من واتساب الذهبي ضد الحظر" rows="3"></textarea>
                
                <label>رابط التحميل المباشر</label>
                <input type="url" id="appLink" placeholder="https://example.com/app.apk">
                
                <label>رابط الصورة</label>
                <input type="url" id="appImage" placeholder="https://example.com/icon.png">
                
                <button onclick="addApp()">إضافة التطبيق</button>
                <div id="formMsg"></div>
            </div>

            <div class="app-list">
                <h2 style="color:#00ff88;margin-bottom:15px">التطبيقات الحالية</h2>
                <div id="appsList"></div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // 1. حط إعدادات Firebase تبعك هون - نفس اللي بصفحة index.html
        const firebaseConfig = {
            apiKey: "AIzaSyBXXXXXXXXXXXXXXXXXXXXXXXXXXX",
            authDomain: "maoqea-9f7bd.firebaseapp.com",
            projectId: "maoqea-9f7bd",
            storageBucket: "maoqea-9f7bd.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        // 2. تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 3. التحقق من حالة الدخول
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'block';
                loadApps();
            } else {
                document.getElementById('loginBox').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'none';
            }
        });

        // 4. دالة الدخول - المعدلة عشان تبين الخطأ
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('loginMsg');
            
            msgDiv.innerHTML = '<div class="success">جاري التحقق...</div>';
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    msgDiv.innerHTML = '<div class="success">تم الدخول بنجاح</div>';
                })
                .catch(e => {
                    console.log('Firebase Error:', e.code, e.message);
                    if (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found') {
                        msgDiv.innerHTML = '<div class="error">الإيميل أو كلمة السر غلط</div>';
                    } else if (e.code === 'auth/operation-not-allowed') {
                        msgDiv.innerHTML = '<div class="error">تسجيل الدخول بالإيميل مو مفعل من Firebase</div>';
                    } else if (e.code === 'auth/unauthorized-domain') {
                        msgDiv.innerHTML = '<div class="error">دومين GitHub مو مضاف بالمسموحات</div>';
                    } else if (e.code === 'auth/too-many-requests') {
                        msgDiv.innerHTML = '<div class="error">محاولات كثيرة. حاول بعد شوي</div>';
                    } else {
                        msgDiv.innerHTML = `<div class="error">خطأ: ${e.code}</div>`;
                    }
                });
        }

        // 5. تسجيل خروج
        function logout() {
            auth.signOut();
        }

        // 6. إضافة تطبيق
        function addApp() {
            const name = document.getElementById('appName').value;
            const desc = document.getElementById('appDesc').value;
            const link = document.getElementById('appLink').value;
            const image = document.getElementById('appImage').value;
            const msgDiv = document.getElementById('formMsg');

            if (!name || !desc || !link || !image) {
                msgDiv.innerHTML = '<div class="error">عبي كل الحقول</div>';
                return;
            }

            msgDiv.innerHTML = '<div class="success">جاري الإضافة...</div>';

            db.collection('apps').add({
                name: name,
                description: desc,
                downloadLink: link,
                imageUrl: image,
                downloads: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                msgDiv.innerHTML = '<div class="success">تمت الإضافة بنجاح</div>';
                document.getElementById('appName').value = '';
                document.getElementById('appDesc').value = '';
                document.getElementById('appLink').value = '';
                document.getElementById('appImage').value = '';
                loadApps();
            }).catch(e => {
                msgDiv.innerHTML = `<div class="error">خطأ: ${e.message}</div>`;
            });
        }

        // 7. تحميل التطبيقات
        function loadApps() {
            const listDiv = document.getElementById('appsList');
            listDiv.innerHTML = 'جاري التحميل...';
            
            db.collection('apps').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                listDiv.innerHTML = '';
                if (snapshot.empty) {
                    listDiv.innerHTML = '<p style="text-align:center;color:#666">لا توجد تطبيقات حالياً</p>';
                    return;
                }
                snapshot.forEach(doc => {
                    const app = doc.data();
                    listDiv.innerHTML += `
                        <div class="app-item">
                            <img src="${app.imageUrl}" onerror="this.src='https://via.placeholder.com/60'">
                            <div class="app-info">
                                <h3>${app.name}</h3>
                                <p>${app.description}</p>
                                <p style="color:#00ff88;font-size:12px">التحميلات: ${app.downloads || 0}</p>
                            </div>
                            <button class="delete-btn" onclick="deleteApp('${doc.id}')">حذف</button>
                        </div>
                    `;
                });
            });
        }

        // 8. حذف تطبيق
        function deleteApp(id) {
            if (confirm('متأكد بدك تحذف هاد التطبيق؟')) {
                db.collection('apps').doc(id).delete();
            }
        }
    </script>
</body>
</html>
