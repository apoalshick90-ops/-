<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ياسر</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        *{margin:0;box-sizing:border-box;font-family:Tahoma}
        body{background:#000;color:#fff}
        .header{background:linear-gradient(135deg, #1877F2 0%, #000 50%, #E50914 100%);padding:25px;text-align:center;box-shadow:0 4px 20px rgba(229,9,20,0.4)}
        .header h1{font-size:28px;text-shadow:3px 3px 6px #000}
        .container{max-width:1200px;margin:30px auto;padding:0 20px}
        .login-box,.panel{background:#0D0D0D;border:2px solid #1877F2;border-radius:18px;padding:25px;margin-bottom:30px}
        .login-box h2,.panel h2{color:#1877F2;margin-bottom:20px;text-align:center}
        input,textarea,select{width:100%;padding:12px;margin:8px 0;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#fff;font-size:15px}
        input:focus,textarea:focus,select:focus{border-color:#1877F2;outline:none}
        .btn{background:linear-gradient(45deg, #E50914, #1877F2);color:white;padding:13px 25px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;width:100%;font-size:16px;margin-top:10px}
        .btn:hover{opacity:0.85}
        .btn-delete{background:#E50914;padding:8px 15px;font-size:13px;width:auto}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px;margin-top:20px}
        .card{background:#1a1a1a;border:2px solid #1877F2;border-radius:15px;padding:15px;position:relative}
        .card img{width:60px;height:60px;border-radius:12px;object-fit:cover;margin-bottom:10px}
        .card h3{color:#1877F2;font-size:16px;margin-bottom:8px}
        .card p{color:#999;font-size:13px;margin-bottom:8px;height:35px;overflow:hidden}
        .card .category{font-size:11px;color:#E50914;margin-bottom:10px;display:block}
        .logout{position:fixed;top:20px;left:20px;background:#E50914;padding:10px 20px;border-radius:8px;cursor:pointer}
        .hidden{display:none}
        .success{color:#27ae60;text-align:center;padding:10px}
        .error{color:#E50914;text-align:center;padding:10px}
    </style>
</head>
<body>
    <div class="header">
        <h1>لوحة تحكم متجر ياسر</h1>
    </div>

    <div id="logoutBtn" class="logout hidden" onclick="logout()">تسجيل خروج</div>

    <div class="container">
        <div id="loginDiv" class="login-box">
            <h2>تسجيل الدخول</h2>
            <input type="email" id="email" placeholder="الإيميل">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button class="btn" onclick="login()">دخول</button>
            <div id="loginMsg"></div>
        </div>

        <div id="adminDiv" class="hidden">
            <div class="panel">
                <h2>إضافة تطبيق جديد</h2>
                <input type="text" id="appName" placeholder="اسم التطبيق">
                <textarea id="appDesc" placeholder="الوصف" rows="3"></textarea>
                <input type="text" id="appImage" placeholder="رابط الصورة">
                <input type="text" id="appLink" placeholder="رابط التحميل">
                <select id="appCategory">
                    <option value="apps">تطبيقات</option>
                    <option value="games">ألعاب</option>
                </select>
                <button class="btn" onclick="addApp()">إضافة التطبيق</button>
                <div id="addMsg"></div>
            </div>

            <div class="panel">
                <h2>التطبيقات المضافة - تتحدث لحظياً</h2>
                <div class="grid" id="appsList"></div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBpHQWj6zPwcW_0NILhZXShS3BNLI39yzM",
      authDomain: "maoqea-9f7bd.firebaseapp.com",
      projectId: "maoqea-9f7bd",
      storageBucket: "maoqea-9f7bd.firebasestorage.app",
      messagingSenderId: "361292746574",
      appId: "1:361292746574:web:dce01eabeec060ca00181f"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginDiv').classList.add('hidden');
            document.getElementById('adminDiv').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            loadAppsRealtime(); // تحديث لحظي
        } else {
            document.getElementById('loginDiv').classList.remove('hidden');
            document.getElementById('adminDiv').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
        }
    });

    function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(email, password)
            .catch(e => document.getElementById('loginMsg').innerHTML = '<div class="error">خطأ بالدخول</div>');
    }

    function logout() {
        auth.signOut();
    }

    async function addApp() {
        const name = document.getElementById('appName').value;
        const description = document.getElementById('appDesc').value;
        const imageUrl = document.getElementById('appImage').value;
        const downloadLink = document.getElementById('appLink').value;
        const category = document.getElementById('appCategory').value;

        if(!name || !description || !imageUrl || !downloadLink) {
            document.getElementById('addMsg').innerHTML = '<div class="error">عبي كل الحقول</div>';
            return;
        }

        await db.collection('applications').add({
            name, description, imageUrl, downloadLink, category,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.getElementById('addMsg').innerHTML = '<div class="success">تمت الإضافة بنجاح ✅</div>';
        document.getElementById('appName').value = '';
        document.getElementById('appDesc').value = '';
        document.getElementById('appImage').value = '';
        document.getElementById('appLink').value = '';
        setTimeout(() => document.getElementById('addMsg').innerHTML = '', 2000);
    }

    // هاي الدالة السرية للتحديث اللحظي
    function loadAppsRealtime() {
        db.collection('applications').orderBy('createdAt', 'desc')
          .onSnapshot(snapshot => {
              const list = document.getElementById('appsList');
              list.innerHTML = '';
              snapshot.forEach(doc => {
                  const app = doc.data();
                  list.innerHTML += `
                      <div class="card">
                          <img src="${app.imageUrl}" alt="${app.name}">
                          <span class="category">${app.category === 'games' ? 'ألعاب' : 'تطبيقات'}</span>
                          <h3>${app.name}</h3>
                          <p>${app.description}</p>
                          <button class="btn btn-delete" onclick="deleteApp('${doc.id}')">حذف</button>
                      </div>
                  `;
              });
          });
    }

    async function deleteApp(id) {
        if(confirm('متأكد بدك تحذف التطبيق؟')) {
            await db.collection('applications').doc(id).delete();
        }
    }
</script>
</body>
</html>
