<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم - ياسر أبو الشيخ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0a0a; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 25px; margin-bottom: 20px; border: 1px solid #333; }
        .card h2 { color: #00ff88; margin-bottom: 20px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #2d2d2d; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 16px; }
        input:focus, textarea:focus { outline: none; border-color: #00ff88; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #00ff88, #00cc6a); border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .app-item { background: #2d2d2d; padding: 15px; border-radius: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .app-info { display: flex; align-items: center; gap: 15px; }
        .app-info img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .delete-btn { background: #ff4444; color: #fff; padding: 8px 15px; width: auto; }
        .status { text-align: center; padding: 10px; margin: 10px 0; border-radius: 8px; display: none; }
        .success { background: #00ff8833; color: #00ff88; border: 1px solid #00ff88; }
        .error { background: #ff444433; color: #ff4444; border: 1px solid #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>إضافة تطبيق جديد</h2>
            <div id="status" class="status"></div>
            <input type="text" id="appName" placeholder="اسم التطبيق - مثلا: واتساب الذهبي">
            <textarea id="appDesc" rows="3" placeholder="وصف التطبيق"></textarea>
            <input type="text" id="appImage" placeholder="رابط الصورة - حط اي رابط لو غلط بيحط صورة افتراضية">
            <input type="text" id="appLink" placeholder="رابط التحميل المباشر APK">
            <button onclick="addApp()">إضافة التطبيق</button>
        </div>

        <div class="card">
            <h2>التطبيقات الحالية</h2>
            <div id="appsList">جاري التحميل...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBpHQWj6zPwcW_0NILhZXShS3BNlI39yzM",
            authDomain: "maoqea-9f7bd.firebaseapp.com",
            projectId: "maoqea-9f7bd",
            storageBucket: "maoqea-9f7bd.firebasestorage.app",
            messagingSenderId: "361292746574",
            appId: "1:361292746574:web:dce01eabeec060ca00181f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // صورة افتراضية لو الرابط خربان
        const DEFAULT_IMAGE = 'https://i.imgur.com/8Qf5z9L.png';

        function showStatus(msg, isError = false) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status ' + (isError ? 'error' : 'success');
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 3000);
        }

        function addApp() {
            const name = document.getElementById('appName').value.trim();
            const desc = document.getElementById('appDesc').value.trim();
            let image = document.getElementById('appImage').value.trim();
            const link = document.getElementById('appLink').value.trim();

            if (!name || !desc || !link) {
                showStatus('عبي كل الحقول يا معلم عدا الصورة اختيارية', true);
                return;
            }

            // لو الرابط فاضي او مو رابط صحيح حط الافتراضية
            if (!image || !image.startsWith('http')) {
                image = DEFAULT_IMAGE;
            }

            db.collection('apps').add({
                name: name,
                description: desc,
                imageUrl: image,
                downloadLink: link,
                downloads: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                showStatus('تمت الإضافة بنجاح ✅');
                document.getElementById('appName').value = '';
                document.getElementById('appDesc').value = '';
                document.getElementById('appImage').value = '';
                document.getElementById('appLink').value = '';
            }).catch(err => {
                showStatus('صار خطأ: ' + err.message, true);
            });
        }

        function deleteApp(id) {
            if (confirm('متأكد بدك تحذف التطبيق؟')) {
                db.collection('apps').doc(id).delete().then(() => {
                    showStatus('تم الحذف ✅');
                });
            }
        }

        function loadApps() {
            db.collection('apps').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                const list = document.getElementById('appsList');
                if (snapshot.empty) {
                    list.innerHTML = '<p style="text-align:center;color:#666">لا توجد تطبيقات</p>';
                    return;
                }
                
                list.innerHTML = '';
                snapshot.forEach(doc => {
                    const app = doc.data();
                    list.innerHTML += `
                        <div class="app-item">
                            <div class="app-info">
                                <img src="${app.imageUrl}" onerror="this.src='${DEFAULT_IMAGE}'">
                                <div>
                                    <strong>${app.name}</strong><br>
                                    <small>التحميلات: ${app.downloads || 0}</small>
                                </div>
                            </div>
                            <button class="delete-btn" onclick="deleteApp('${doc.id}')">حذف</button>
                        </div>
                    `;
                });
            });
        }

        loadApps();
    </script>
</body>
</html>
